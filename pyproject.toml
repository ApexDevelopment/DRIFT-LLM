[build-system]
requires = [
    "setuptools>=42",
    "wheel"
]
build-backend = "setuptools.build_meta"

[project]
name = "petals"
dynamic = ["version"]
description = "Easy way to efficiently run 100B+ language models without high-end GPUs"
readme = "README.md"
requires-python = ">=3.8"
authors = [
    { name = "Petals Developers", email = "petals-devs@googlegroups.com" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "torch>=2.3,<2.4",  # baseline era: torch 2.4+ ships triton>=3.0, which drops triton.ops that bitsandbytes 0.41.1 imports
    "bitsandbytes==0.41.1",
    "accelerate>=0.27.2",
    "huggingface-hub>=0.11.1,<1.0.0",
    "tokenizers>=0.13.3",
    "transformers==4.43.1",  # if you change this, please also change version assert in petals/__init__.py
    "speedtest-cli==2.1.3",
    "hivemind @ git+https://github.com/learning-at-home/hivemind.git@213bff98a62accb91f254e2afdccbf1d69ebdea9",
    "tensor_parallel==1.0.23",
    "humanfriendly",
    "async-timeout>=4.0.2",
    "cpufeature>=0.2.0; platform_machine == 'x86_64'",
    "packaging>=20.9",
    "sentencepiece>=0.1.99",
    "peft==0.8.2",
    "safetensors>=0.3.1",
    "Dijkstar>=2.6.0",
    "numpy<2",
]

[project.optional-dependencies]
dev = [
    "pytest==6.2.5",
    "pytest-forked",
    "pytest-asyncio==0.16.0",
    "black==22.3.0",
    "isort==5.10.1",
    "psutil",
]

[project.urls]
Homepage = "https://github.com/bigscience-workshop/petals"
"Bug Tracker" = "https://github.com/bigscience-workshop/petals/issues"

[tool.uv]
# The pinned hivemind commit ships a legacy setup.py that imports `pkg_resources` at
# build time, which recent setuptools no longer provides. Constrain the build backend
# so the sdist builds. TODO(Phase 7): drop once hivemind is upgraded to a modern build.
build-constraint-dependencies = ["setuptools<70"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = { attr = "petals.__version__" }

[tool.black]
line-length = 120
required-version = "22.3.0"

[tool.isort]
profile = "black"
line_length = 120
combine_as_imports = true
combine_star = true
known_local_folder = ["tests", "cli"]
known_first_party = ["test_utils"]
